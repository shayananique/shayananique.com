title: Shayan Anique
author: Shayan Anique
avatar_url: https://2.gravatar.com/avatar/e2cc328e3037a43994c99f5d7695040e?s=160 # Should be 160x160px.
# email: your-email@domain.com  # Comment out this line if you don't want to expose your email.
description: >
  Technology, Software, Management, and
  Open Source.
repository: shayananique/shayananique.com

# Google Analytics
google_analytics: UA-196927369-1

# contact
contact:
#  email: your-email@domain.com  # Comment out this line if you don't want to expose your email.
  url: https://github.com/shayananique/feedback/issues/new # Uncomment this to provide a contact form url instead of an email

# social links
twitter_username: shayan_anique
github_username:  shayananique
rss: rss

# 
# Subscribe Feed
# 
# By default, your site generates a subscription feed (RSS/Atom) at /feed.xml
# Uncomment the next two lines to change the path.
feed:
   path: /atom.xml

# If you use a feed publisher such as Feedburner, uncomment the next line
#subscribe_rss:
# Homepage
show_excerpts: true  # set to true to show excerpts on the homepage, otherwise full posts are shown

# Comments
# To enable comments, set the `enabled` field to true and supply either a Disqus short name or a Jekyll comments receiver
#comments:
  #enabled: true
  #show_count: true
  #receiver: 

emptyArray: [] # Leave this here.

# haackbar date format
# refer to http://shopify.github.io/liquid/filters/date/ if you want to customize this
haackbar:
  date_format: "%b %-d, %Y"

#
# Jekyll Settings
#
permalink: /archive/:year/:month/:day/:title/
paginate: 20
page_group_size: 5 # number of pages to group by in the pagination.
paginate_path: "/archive/page/:num"
category_dir: categories

# Build settings
markdown: kramdown
kramdown:
  hard_wrap: false
remote_theme: shayananique/haackbar

exclude: [README.md CODE_OF_CONDUCT.md script .gitattributes .gitignore keybase.txt RakeFile]
keep_files: [images demos code ads.txt robots.txt favicon.ico]
incremental: true

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-include-cache